  {key:"purchase",icon:"🛍",label:"Purchase Behavior",fields:[{key:"researchDepth",label:"Research Depth",type:"multi",options:["None","Basic","Deep researcher"]},{key:"channelPref",label:"Channel Preference",type:"multi",options:["In-store","Online","Omnichannel"]},{key:"peerRecommendation",label:"Peer Recommendation Weight",type:"multi",options:["Low","Medium","High"]}]},

ne":["Kyiv","Kharkiv","Odessa","Dnipro","Lviv"],"USA":["New York","Los Angeles","Chicago","Houston","Phoenix","San Antonio","San Diego","Dallas","San Jose","Austin","San Francisco","Seattle","Denver","Washington DC","Miami","Atlanta","Boston"],"Uzbekistan":["Tashkent","Samarkand","Namangan","Andijan"],"Vietnam":["Ho Chi Minh City","Hanoi","Da Nang","Hai Phong"],"Zimbabwe":["Harare","Bulawayo","Chitungwiza"],
};
const ALL_COUNTRIES=Object.keys(COUNTRY_CITIES).sort((a,b)=>a.localeCompare(b));
const emptyRForm=()=>({name:"",geo:{country:"",cities:[]},researchGoal:"",numberOfPeople:"",language:"auto",tier:2,persona:emptyPersona()});

// Storage
const loadP=async()=>{try{const r=await window.storage.get(STORAGE_KEY);return r?JSON.parse(r.value):[];}catch(_){return[];}};
const saveP=async(list)=>{try{await window.storage.set(STORAGE_KEY,JSON.stringify(list));}catch(_){}};

// Verified data fetcher
const fetchVerifiedData=async(form,onProgress)=>{
  const country=form.geo.country.trim();
  const results={worldBank:{},restCountries:{},exchangeRate:{},fetchedAt:new Date().toISOString()};
  try{onProgress("Fetching country profile…");const res=await fetch(`https://restcountries.com/v3.1/name/${encodeURIComponent(country)}?fullText=false&fields=name,capital,region,subregion,population,area,languages,currencies,cca2,cca3`);if(res.ok){const data=await res.json();const c=data[0];results.restCountries={name:c.name?.common,capital:c.capital?.[0],region:c.region,population:c.population,languages:Object.values(c.languages||{}),currencies:Object.entries(c.currencies||{}).map(([k,v])=>`${v.name} (${v.symbol||k})`),cca3:c.cca3};}}catch(e){results.restCountries.error=e.message;}
  const ISO=results.restCountries?.cca3||country.slice(0,3).toUpperCase();
  const WB=[["NY.GDP.MKTP.CD","GDP (current USD)"],["NY.GDP.PCAP.CD","GDP per capita"],["FP.CPI.TOTL.ZG","Inflation (%)"],["SP.URB.TOTL.IN.ZS","Urban population (%)"],["IT.NET.USER.ZS","Internet users (%)"],["SP.POP.TOTL","Total population"],["SL.UEM.TOTL.ZS","Unemployment (%)"]];
  try{onProgress("Fetching World Bank indicators…");const wbR=await Promise.all(WB.map(([code])=>fetch(`https://api.worldbank.org/v2/country/${ISO}/indicator/${code}?format=json&mrv=3&per_page=3`).then(r=>r.ok?r.json():null).catch(()=>null)));const wb={};wbR.forEach((data,i)=>{if(!data||!data[1])return;const[code,label]=WB[i];const entries=data[1].filter(d=>d.value!==null);if(entries.length>0)wb[code]={label,value:entries[0].value,year:entries[0].date};});results.worldBank=wb;}catch(e){results.worldBank.error=e.message;}
  try{onProgress("Fetching exchange rates…");const fxRes=await fetch(`https://open.er-api.com/v6/latest/USD`);if(fxRes.ok){const fx=await fxRes.json();results.exchangeRate={base:"USD",lastUpdate:fx.time_last_update_utc};}}catch(e){results.exchangeRate.error=e.message;}
  onProgress("Structuring verified context…");return results;
};

// Build prompt
const buildPrompt=(f,verifiedData=null)=>{
  const lang=f.language==="auto"?`Detect the primary local language of ${f.geo.country} and write ALL prose in that language. Keep JSON keys in English.`:f.language==="en"?"Write all prose in English.":`Write ALL prose in language code "${f.language}". Keep JSON keys in English.`;
  const p=f.persona;
  const geoStr=`${f.geo.country}${f.geo.cities?.length?", "+f.geo.cities.join(" / "):""}`;
  const multiLines=PERSONA_GROUPS.filter(g=>g.key!=="core").flatMap(g=>g.fields.map(field=>{const vals=(p[field.key]||[]);return vals.length>0?`${field.label}: ${vals.join(", ")}`:null;})).filter(Boolean).join(" | ");
  if(f.tier===1)return{prompt:`You are a world-class consumer & market research analyst. Generate a comprehensive synthetic consumer research report.\n${lang}\nSchema (return ONLY this JSON, no markdown fences):\n{"tier":1,"language":"<language name>","searchedSources":[],"dataProviders":[],"archetypes":[{"name":"string","description":"3-4 rich sentences","traits":["4-6 labels"],"sharePercent":<int>}],"insights":"400-500 word prose","opportunities":"300-400 word prose","solutions":"350-450 word prose"}\nRules: archetypes min 2, sharePercent sums to 100, no bullet lists.\nGeo: ${geoStr} | Goal: ${f.researchGoal||"Market discovery"} | Audience: ${f.numberOfPeople||"unspecified"}\nPersona: Age ${p.ageMin}–${p.ageMax} | ${p.gender} | ${p.incomeLevel} | ${p.education} | ${p.occupation}\nExtended: ${multiLines||"None"}`,useWebSearch:false};
  if(f.tier===2)return{prompt:`You are a world-class consumer & market research analyst with live web search. Use web_search tool multiple times.\nREQUIRED SEARCHES:\n1. "${f.geo.country} consumer market size 2024 2025"\n2. "${geoStr} consumer behavior trends 2024"\n3. "${f.geo.country} market competitors landscape 2024"\n4. "${f.geo.country} economic indicators GDP 2024 2025"\n5. "${p.ageMin}–${p.ageMax} age ${f.geo.country} ${f.researchGoal||"consumer"} trends"\n${lang}\nSchema (return ONLY this JSON, no markdown fences):\n{"tier":2,"language":"<language name>","searchedSources":["<up to 8 real sources>"],"dataProviders":[],"archetypes":[{"name":"string","description":"3-4 rich sentences with real data","traits":["4-6 labels"],"sharePercent":<int>}],"insights":"450-550 word prose","opportunities":"350-450 word prose","solutions":"400-500 word prose"}\nRules: archetypes min 2, sharePercent sums to 100, no bullet lists.\nGeo: ${geoStr} | Goal: ${f.researchGoal||"Market discovery"} | Audience: ${f.numberOfPeople||"unspecified"}\nPersona: Age ${p.ageMin}–${p.ageMax} | ${p.gender} | ${p.incomeLevel} | ${p.education} | ${p.occupation}\nExtended: ${multiLines||"None"}`,useWebSearch:true};
  const buildVC=(vd)=>{if(!vd)return"";const lines=[];const rc=vd.restCountries||{};if(rc.name)lines.push(`Country: ${rc.name} | Capital: ${rc.capital} | Region: ${rc.region}`);if(rc.population)lines.push(`Population: ${Number(rc.population).toLocaleString()}`);const wb=vd.worldBank||{};const wbF=Object.values(wb).filter(v=>v&&v.value!=null).map(v=>`${v.label}: ${typeof v.value==="number"?v.value.toLocaleString(undefined,{maximumFractionDigits:2}):v.value} (${v.year})`);if(wbF.length)lines.push("World Bank:\n  "+wbF.join("\n  "));return lines.join("\n");};
  return{prompt:`You are a world-class consumer & market research analyst. You have VERIFIED data + use web_search.\n═══ VERIFIED DATA ═══\n${buildVC(verifiedData)}\n═══════════════════\nREQUIRED SEARCHES:\n1. "${f.geo.country} consumer market size 2024 2025"\n2. "${f.geo.country} top companies market share 2024"\n3. "${f.geo.country} consumer spending patterns latest"\n4. "${f.geo.country} investment opportunities growth forecast"\n${lang}\nSchema (return ONLY this JSON, no markdown fences):\n{"tier":3,"language":"<language name>","searchedSources":["<up to 10 sources>"],"dataProviders":["World Bank","REST Countries","Open Exchange"],"verifiedStats":[{"label":"string","value":"string","source":"string","year":"string"}],"archetypes":[{"name":"string","description":"4-5 rich sentences citing verified data","traits":["5-7 labels"],"sharePercent":<int>}],"insights":"550-650 word prose","opportunities":"400-500 word prose","solutions":"450-550 word prose"}\nRules: archetypes min 3, sharePercent sums to 100, no bullet lists.\nGeo: ${geoStr} | Goal: ${f.researchGoal||"Market discovery"} | Audience: ${f.numberOfPeople||"unspecified"}\nPersona: Age ${p.ageMin}–${p.ageMax} | ${p.gender} | ${p.incomeLevel} | ${p.education} | ${p.occupation}\nExtended: ${multiLines||"None"}`,useWebSearch:true};
};

// PDF export
const triggerPDF=(run,projName)=>{
  const r=run.results,geo=`${run.geo.country}${run.geo.cities?.length?", "+run.geo.cities[0]:""}`,tier=TIERS[run.tier||2];
  const archHTML=(r.archetypes||[]).map((a,i)=>{const c=ARCH_COLORS[i%8],pct=a.sharePercent||0;return`<div style="background:#111;border-radius:12px;padding:18px;border-left:4px solid ${c};margin-bottom:14px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><strong style="font-size:13px;color:#fff;flex:1">${a.name}</strong><span style="font-size:12px;font-weight:700;color:${c}">${pct}%</span></div><p style="font-size:12px;color:#888;line-height:1.6;margin-bottom:10px">${a.description}</p><div style="display:flex;flex-wrap:wrap;gap:4px">${(a.traits||[]).map(t=>`<span style="font-size:10px;background:#222;border:1px solid #333;border-radius:10px;padding:2px 8px;color:#ccc">${t}</span>`).join("")}</div></div>`;}).join("");
  const prose=t=>(t||"").replace(/\n\n/g,"</p><p style='margin-top:12px'>").replace(/\n/g," ");
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#000;color:#fff}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head><body><div style="padding:64px;background:#000;min-height:100vh;page-break-after:always"><div style="font-size:14px;font-weight:800;color:#FF9500;margin-bottom:40px">● ResearchLens</div><div style="font-size:56px;font-weight:900;line-height:1.0;letter-spacing:-2px;margin-bottom:20px">${run.name||"Research Report"}<br><span style="color:#FF9500">${geo}.</span></div><div style="font-size:16px;color:#888;margin-bottom:40px">${run.persona.ageMin}–${run.persona.ageMax} yrs · ${run.persona.incomeLevel}</div><div style="display:flex;gap:40px">${[["Project",projName||"—"],["Geography",geo],["Date",run.createdAt],["Tier",`Tier ${run.tier||2} — ${tier.label}`]].map(([l,v])=>`<div><div style="font-size:9px;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">${l}</div><div style="font-size:14px;color:#fff;font-weight:600">${v}</div></div>`).join("")}</div></div>${[["🎭","Archetypes",archHTML],["🔍","Insights",`<p style="font-size:13.5px;line-height:1.8;color:#aaa">${prose(r.insights)}</p>`],["🚀","Opportunities",`<p style="font-size:13.5px;line-height:1.8;color:#aaa">${prose(r.opportunities)}</p>`],["💡","Solutions",`<p style="font-size:13.5px;line-height:1.8;color:#aaa">${prose(r.solutions)}</p>`]].map(([icon,title,body])=>`<div style="padding:52px 64px;background:#000;page-break-after:always"><div style="font-size:28px;font-weight:900;margin-bottom:32px;color:#fff">${icon} ${title}</div>${body}</div>`).join("")}</body></html>`;
  const w=window.open("","_blank");w.document.write(html);w.document.close();w.onload=()=>{w.focus();w.print();};
};

// CSS helpers
const css={
  page:{minHeight:"100vh",background:"#000",color:"#fff"},
  card:{background:"#111",border:"1px solid #222",borderRadius:16},
  input:{width:"100%",background:"#111",border:"1px solid #222",borderRadius:10,padding:"11px 14px",fontSize:14,color:"#fff",outline:"none",boxSizing:"border-box"},
  label:{display:"block",fontSize:12,color:"#666",marginBottom:6,fontWeight:500},
};

// UI Components
function Input({label,value,onChange,placeholder,type="text",min,rows}){
  const[f,setF]=useState(false);
