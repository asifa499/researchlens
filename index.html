function fetchVerifiedData(form,onProgress){
  var country=form.geo.country.trim();
  var results={worldBank:{},restCountries:{},exchangeRate:{},fetchedAt:new Date().toISOString()};
  var WB=[["NY.GDP.MKTP.CD","GDP (current USD)"],["NY.GDP.PCAP.CD","GDP per capita"],["FP.CPI.TOTL.ZG","Inflation (%)"],["SP.URB.TOTL.IN.ZS","Urban population (%)"],["IT.NET.USER.ZS","Internet users (%)"],["SP.POP.TOTL","Total population"],["SL.UEM.TOTL.ZS","Unemployment (%)"]];
  onProgress("Fetching country profile…");
  return fetch("https://restcountries.com/v3.1/name/"+encodeURIComponent(country)+"?fullText=false&fields=name,capital,region,population,languages,currencies,cca3")
    .then(function(r){if(r.ok)return r.json();return [];})
    .then(function(data){
      if(data&&data[0]){var c=data[0];results.restCountries={name:c.name&&c.name.common,capital:c.capital&&c.capital[0],region:c.region,population:c.population,cca3:c.cca3};}
      var ISO=(results.restCountries&&results.restCountries.cca3)||country.slice(0,3).toUpperCase();
      onProgress("Fetching World Bank indicators…");
      return Promise.all(WB.map(function(pair){return fetch("https://api.worldbank.org/v2/country/"+ISO+"/indicator/"+pair[0]+"?format=json&mrv=3&per_page=3").then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});}));
    })
    .then(function(wbR){
      var wb={};
      wbR.forEach(function(data,i){if(!data||!data[1])return;var code=WB[i][0],label=WB[i][1];var entries=data[1].filter(function(d){return d.value!==null;});if(entries.length>0)wb[code]={label:label,value:entries[0].value,year:entries[0].date};});
      results.worldBank=wb;
      onProgress("Fetching exchange rates…");
      return fetch("https://open.er-api.com/v6/latest/USD").then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
